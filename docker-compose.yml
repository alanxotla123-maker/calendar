services:
  db:
    image: postgres:17-alpine
    container_name: calendar-savings-db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
      POSTGRES_DB: ${DB_NAME:-calendar_savings}
    ports:
      - ${DB_PORT:-5440}:5432
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres} -d ${DB_NAME:-calendar_savings}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
